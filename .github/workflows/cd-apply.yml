name: CD Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.8.5
  TF_INFRA_DIR: infra
  AWS_REGION: us-east-1

jobs:
  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.TF_INFRA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_RUNNER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (dev)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Plan (dev)
        run: terraform plan -var-file=envs/dev/dev.tfvars -out=tfplan-dev

      - name: Terraform Apply (dev)
        run: terraform apply tfplan-dev

  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: [apply-dev]
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.TF_INFRA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CI_RUNNER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Who am I?
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (staging)
        run: terraform init -backend-config=envs/staging/backend-staging.hcl

      - name: Terraform Plan (staging)
        run: terraform plan -var-file=envs/staging/staging.tfvars -out=tfplan-staging

      - name: Terraform Apply (staging)
        run: terraform apply tfplan-staging
