name: CD Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.8.5
  TF_INFRA_DIR: infra

jobs:
  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.TF_INFRA_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_secret_key: ${{ secrets.DEV_SECRET_KEY }}
    outputs:
      plan_found: ${{ steps.check_artifact.outputs.found }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Dev Plan Artifact from PR
        id: download_artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.TF_INFRA_DIR }}

      - name: Check Plan Artifact Exists
        id: check_artifact
        run: |
          if [ -f "tfplan-dev" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init (dev)
        if: steps.check_artifact.outputs.found == 'true'
        run: terraform init -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Apply (dev)
        if: steps.check_artifact.outputs.found == 'true'
        run: terraform apply tfplan-dev

  apply-staging:
    name: Apply Staging
    runs-on: ubuntu-latest
    needs: [apply-dev]
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.TF_INFRA_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_secret_key: ${{ secrets.STAGING_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Staging Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.TF_INFRA_DIR }}

      - name: Terraform Init (staging)
        run: terraform init -backend-config=envs/staging/backend-staging.hcl

      - name: Terraform Apply (staging)
        run: terraform apply tfplan-staging
