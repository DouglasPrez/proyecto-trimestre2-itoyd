name: Terraform CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

defaults:
  run:
    working-directory: infra

jobs:
  plan:
    name: Lint · Init · Validate · Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Format Check
        run: terraform fmt --check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=proyecto-trimestre2-itoyd-tfstate" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set -o pipefail
          terraform plan \
            -var-file="envs/dev/dev.tfvars" \
            -no-color 2>&1 | tee plan.txt
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Comment Plan on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const body = [
              '## 🗺️ Terraform Plan — Delivery 3 (Network + Ingress)',
              '',
              '<details><summary>Ver plan completo</summary>',
              '',
              '```hcl',
              plan.substring(0, 60000),
              '```',
              '',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

  apply:
    name: Apply on merge
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=proyecto-trimestre2-itoyd-tfstate" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="envs/dev/dev.tfvars" \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
