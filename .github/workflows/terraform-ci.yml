name: Terraform CI

on:
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: infra

jobs:
  terraform:
    name: Lint · Init · Validate · Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Terraform Format Check
        run: terraform fmt --check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file="envs/dev/dev.tfvars" -no-color | tee plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🧪 Terraform Plan\n\n<details><summary>Ver plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`
            });
