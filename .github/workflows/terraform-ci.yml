name: Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'src/**'

defaults:
  run:
    working-directory: infra

jobs:
  plan:
    name: Lint · Init · Validate · Plan
    runs-on: ubuntu-latest
    environment: dev 

    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            us-east-1
      TF_VAR_secret_key:     ${{ secrets.DEV_SECRET_KEY }}
      TF_VAR_db_password:    ${{ secrets.DB_PASSWORD }} 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5 

      - name: Terraform Format Check
        run: terraform fmt --check -recursive

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend-dev.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set -o pipefail
          terraform plan \
            -var-file="envs/dev/dev.tfvars" \
            -no-color 2>&1 | tee plan.txt

      # Publica de forma automática el resultado del plan en el Pull Request
      - name: Comment Plan on PR
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const body = [
              '## 🗺️ Terraform Plan — Entorno de Desarrollo (CI)',
              '',
              '<details><summary>Ver plan completo</summary>',
              '',
              '```hcl',
              plan.substring(0, 60000),
              '```',
              '',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
